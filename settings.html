<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="./ColorPicker/coloris.css">
        <script src="./ColorPicker/coloris.js"></script>
        <script>
            Coloris({alpha:false});
        </script>
    </head>
    <body id="background" style="background-color: #f37310;">
        <span id="sideBar" style="background-color: coral;">
            <button class="menuButton" id="mainMenu" onclick="location.href='index.html'"><img src="Logo.png" alt="Main Menu"><h1>Main Menu</h1></button>
            <button class="menuButton" id="settings"><img src="Settings.png" alt="Settings"><h1>Settings</h1></button>
            <hr id="divider">
            <button class="menuButton" id="Pokemon" onclick="location.href='./Games/Pokemon/Pokemon.html'"><img src="Pokemon.png" alt="Pokemon"><h1>Pokemon</h1></button>
            <button class="menuButton" id="Mario" onclick="location.href='./Games/Mario/Mario.html'"><img src="Mario.png" alt="Mario"><h1>Mario</h1></button>
            <button class="menuButton" id="Minecraft"><img src="Minecraft.png" alt="Minecraft"><h1>Minecraft</h1></button>
            <button class="menuButton" id="Zelda" onclick="location.href='./Games/Zelda/Zelda.html'"><img src="Zelda.png" alt="Zelda"><h1>Zelda</h1></button>
            <button class="menuButton" id="Flash"><img src="Flash.png" alt="Flash"><h1>Flash</h1></button>
        </span>

        <span id="topBar" style="background-color: coral; border-bottom-color: white;">
            <img src="Logo.png" alt="BeniGames" class="logo">
            <h1>Settings</h1>
        </span>

        <div class="Content">
            <h1><strong>Theme</strong></h1>
            <h2>Main Color</h2>
            <input type="text" id="MainColor" data-coloris>
            <h2>Secondary Color</h2>
            <input type="text" id="SecondaryColor" data-coloris>
            <h2>Accent Color</h2>
            <input type="text" id="AccentColor" data-coloris>
            <button class="ColorApply" id="ApplyColor">Apply</button>
        </div>
    </body>
</html>

<script src="settings.js"></script>
<script src="styling.js"></script>
