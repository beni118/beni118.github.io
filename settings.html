<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="./ColorPicker/coloris.css">
        <script src="./ColorPicker/coloris.js"></script>
        <script>
            Coloris({alpha:false});
        </script>
    </head>
    <body id="background" style="background-color: #f37310;">

        <span id="topBar" style="background-color: coral; border-bottom-color: white;">
            <img src="Logo.png" alt="BeniGames" class="logo">
            <h1>Settings</h1>
        </span>

        <div class="wrap">
            <div class="sidebar" style="background-color: coral;">
                <div class="item"><span class="icon"><img src="Logo.png" onclick="location.href='index.html'"></span><span class="label">Main Menu</span></div>
                <div class="item"><span class="icon"><img src="Settings.png" onclick="location.href='settings.html'"></span><span class="label">Settings</span></div>
                <div class="item"><span class="icon"><img src="Mario.png" onclick="location.href='Games/Mario/Mario.html'"></span><span class="label">Mario</span></div>
                <div class="item"><span class="icon"><img src="Pokemon.png" onclick="location.href='Games/Pokemon/Pokemon.html'"></span><span class="label">Pokemon</span></div>
                <div class="item"><span class="icon"><img src="Zelda.png" onclick="location.href='Games/Zelda/Zelda.html'"></span><span class="label">Zelda</span></div>
            </div>
        </div>

        <div class="Content">
            <h1><strong>Theme</strong></h1>
            <h2>Main Color</h2>
            <input type="text" id="MainColor" data-coloris>
            <h2>Secondary Color</h2>
            <input type="text" id="SecondaryColor" data-coloris>
            <h2>Accent Color</h2>
            <input type="text" id="AccentColor" data-coloris>
            <button class="ColorApply" id="ApplyColor">Apply</button>
        </div>
    </body>
</html>

<script src="settings.js"></script>
<script src="styling.js"></script>
